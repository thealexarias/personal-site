    <header id="masthead">
        <h1>

    <main class="prose">
        <article>

            <h2>Contact</h2>
            <p>Most reliable way to reach me. I read every message. Replies might take a minute. I'll get back to ya, promise.</p>

            <form action="https://api.web3forms.com/submit" method="POST" autocomplete="off">
                <input type="hidden" name="access_key" value="a102ea6d-1efc-4a8b-9f19-437fd7ae24fb">
                <input type="hidden" name="subject" value="alexarias.me contact form">
                <input type="hidden" name="redirect" value="https://alexarias.me/pages/thanks.html">
                <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

                <label for="name">Your name</label>
                <input type="text" id="name" name="name">

                <label for="email">Your email *</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Send</button>
            </form>

        </article>
    </main>
